# HPC 平台作业模板配置文件
# 每个 [[template]] 块定义一个模板
# 手动编辑后重启后端生效，或通过前端管理界面动态修改

[[template]]
id = 1
name = "Fluent 流体仿真"
icon = "🌊"
category = "cfd"
app_type = "Fluent"
description = "ANSYS Fluent 流体动力学仿真标准配置"
nodes = 2
cpus = 48
gpus = 0
memory = 128
time = 24
partition = "compute"
module_load = "ansys/2023R1"
executable = "fluent"
input_file = "case.cas"
[template.app_params]
版本 = "v2023R1"
求解器 = "pressure-based"
并行方式 = "MPI"
精度 = "double"

[[template]]
id = 2
name = "Gaussian 量子化学"
icon = "⚗️"
category = "chemistry"
app_type = "Gaussian"
description = "Gaussian 量子化学计算标准配置"
nodes = 1
cpus = 32
gpus = 0
memory = 64
time = 48
partition = "compute"
module_load = "gaussian/g16"
executable = "g16"
input_file = "input.gjf"
[template.app_params]
版本 = "G16"
计算方法 = "DFT/B3LYP"
基组 = "6-31G(d)"
内存 = "32GB"

[[template]]
id = 3
name = "LAMMPS 分子动力学"
icon = "🔬"
category = "md"
app_type = "LAMMPS"
description = "LAMMPS 大规模原子/分子并行模拟"
nodes = 4
cpus = 128
gpus = 0
memory = 256
time = 72
partition = "compute"
module_load = "lammps/2023"
executable = "lmp_mpi"
input_file = "in.lammps"
[template.app_params]
版本 = "2023.08.02"
力场 = "ReaxFF"
时间步长 = "0.5 fs"
总步数 = "1000000"

[[template]]
id = 4
name = "PyTorch 深度学习"
icon = "🤖"
category = "ai"
app_type = "PyTorch"
description = "PyTorch 深度学习训练标准配置"
nodes = 1
cpus = 16
gpus = 4
memory = 64
time = 48
partition = "gpu"
module_load = "pytorch/2.1.0-cuda11.8"
executable = "python"
input_file = "train.py"
[template.app_params]
版本 = "2.1.0"
CUDA = "11.8"
Python = "3.10"
批次大小 = "32"

[[template]]
id = 5
name = "OpenFOAM CFD"
icon = "🌊"
category = "cfd"
app_type = "OpenFOAM"
description = "OpenFOAM 开源 CFD 工具包"
nodes = 4
cpus = 96
gpus = 0
memory = 192
time = 36
partition = "compute"
module_load = "openfoam/v2306"
